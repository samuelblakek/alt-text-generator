app = "menkind-alt-text-generator"
primary_region = "lhr"

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"
  GEMINI_MAX_CONCURRENCY = "3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "alt_text_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512
